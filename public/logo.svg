<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Notebook page background -->
  <rect x="60" y="40" width="392" height="432" rx="8" fill="#FFFDF5" stroke="#E8DFD4" stroke-width="4"/>
  <!-- Spiral binding holes -->
  <circle cx="90" cy="80" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="130" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="180" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="230" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="280" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="330" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="380" r="8" fill="#E8DFD4"/>
  <circle cx="90" cy="430" r="8" fill="#E8DFD4"/>
  <!-- Red margin line -->
  <line x1="120" y1="40" x2="120" y2="472" stroke="#C84B31" stroke-width="2" opacity="0.5"/>
  <!-- Lined paper -->
  <line x1="130" y1="100" x2="430" y2="100" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="140" x2="430" y2="140" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="180" x2="430" y2="180" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="220" x2="430" y2="220" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="260" x2="430" y2="260" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="300" x2="430" y2="300" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="340" x2="430" y2="340" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="380" x2="430" y2="380" stroke="#E8DFD4" stroke-width="1"/>
  <line x1="130" y1="420" x2="430" y2="420" stroke="#E8DFD4" stroke-width="1"/>
  <!-- "Recipo" in handwritten style -->
  <text x="180" y="200" font-family="Georgia, serif" font-size="72" font-style="italic" fill="#3D2B1F" letter-spacing="-2">Recipo</text>
  <!-- Fork icon -->
  <g transform="translate(200, 280) scale(0.8)" fill="none" stroke="#C84B31" stroke-width="6" stroke-linecap="round">
    <line x1="40" y1="0" x2="40" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="40"/>
    <line x1="40" y1="0" x2="40" y2="40"/>
    <line x1="60" y1="0" x2="60" y2="40"/>
    <path d="M 20 40 Q 20 60 40 60 Q 60 60 60 40"/>
  </g>
  <!-- Git branch icon -->
  <g transform="translate(300, 290) scale(0.7)" fill="none" stroke="#5B7A5E" stroke-width="6" stroke-linecap="round">
    <circle cx="30" cy="20" r="10"/>
    <circle cx="30" cy="90" r="10"/>
    <circle cx="70" cy="50" r="10"/>
    <line x1="30" y1="30" x2="30" y2="80"/>
    <path d="M 30 40 Q 30 50 50 50 L 60 50"/>
  </g>
</svg>
